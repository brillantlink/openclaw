# fly.toml app configuration file generated for openclaw-brillant on 2026-04-30T00:47:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "openclaw-brillant"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  OPENCLAW_PREFER_PNPM = "1"
  OPENCLAW_STATE_DIR = "/data"
  NODE_OPTIONS = "--max-old-space-size=1536"
  OPENCLAW_GATEWAY_BIND = "lan"
  OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS = "[\"https://openclaw-brillant.fly.dev\"]"
  OPENCLAW_GATEWAY_TRUSTEDPROXIES = "[\"172.16.0.0/12\"]"

[processes]
  app = "node dist/index.js gateway --allow-unconfigured --port 3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"
  swap_size_mb = 2048

[[mounts]]
  source = "openclaw_data"
  destination = "/data"
  initial_size = "3gb"
